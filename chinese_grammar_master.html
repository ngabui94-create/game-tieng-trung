<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bậc Thầy Ngữ Pháp Tiếng Trung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f8fafc; }
        .chinese-font { font-family: 'ZCOOL+XiaoWei', serif; }
        .word-card { cursor: grab; transition: all 0.2s; }
        .word-card:active { cursor: grabbing; scale: 0.95; }
        .drop-zone { min-height: 80px; transition: all 0.3s; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="bg-emerald-600 text-white p-6 rounded-t-3xl shadow-lg mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold">🏗️ BẬC THẦY NGỮ PHÁP</h1>
                    <p class="opacity-80">Sắp xếp các từ thành câu đúng</p>
                </div>
                <a href="index.html" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-full text-sm font-bold">← TRANG CHỦ</a>
            </div>
        </div>

        <!-- Khối trò chơi -->
        <div class="bg-white rounded-2xl shadow-xl p-6 border-b-8 border-emerald-500">
            <div class="mb-8">
                <p class="text-gray-500 mb-2 uppercase tracking-widest text-xs font-bold">Thử thách:</p>
                <h2 class="text-xl font-semibold text-gray-800">Sắp xếp: "Tôi là người Việt Nam"</h2>
            </div>

            <!-- Vùng chứa các từ xáo trộn -->
            <div class="mb-10">
                <p class="text-sm text-gray-400 mb-3">Kéo các từ vào ô trống bên dưới:</p>
                <div id="source-zone" class="flex flex-wrap gap-3 p-4 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200">
                    <div draggable="true" ondragstart="drag(event)" id="word-1" class="word-card bg-white border-2 border-emerald-200 px-4 py-2 rounded-lg shadow-sm font-bold text-emerald-700 text-lg chinese-font">是 (shì)</div>
                    <div draggable="true" ondragstart="drag(event)" id="word-2" class="word-card bg-white border-2 border-emerald-200 px-4 py-2 rounded-lg shadow-sm font-bold text-emerald-700 text-lg chinese-font">我 (wǒ)</div>
                    <div draggable="true" ondragstart="drag(event)" id="word-3" class="word-card bg-white border-2 border-emerald-200 px-4 py-2 rounded-lg shadow-sm font-bold text-emerald-700 text-lg chinese-font">越南人 (Yuènán rén)</div>
                </div>
            </div>

            <!-- Vùng thả từ -->
            <div class="mb-6">
                <p class="text-sm text-gray-400 mb-3">Câu của bạn:</p>
                <div id="target-zone" ondrop="drop(event)" ondragover="allowDrop(event)" class="drop-zone flex flex-wrap gap-3 p-4 bg-emerald-50 rounded-xl border-2 border-emerald-100 ring-4 ring-emerald-50/50">
                    <!-- Từ sẽ được thả vào đây -->
                </div>
            </div>

            <!-- Nút kiểm tra -->
            <div class="flex gap-3">
                <button onclick="checkGrammar()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-emerald-200">KIỂM TRA CÂU</button>
                <button onclick="resetGame()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-3 px-6 rounded-xl transition">LÀM LẠI</button>
            </div>

            <div id="result-msg" class="mt-6 hidden p-4 rounded-xl text-center font-bold text-lg"></div>
        </div>
    </div>

    <script>
        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
        }

        function drop(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            var node = document.getElementById(data);
            
            // Chỉ cho phép thả vào vùng target hoặc trả về vùng source
            if (ev.target.id === "target-zone" || ev.target.id === "source-zone") {
                ev.target.appendChild(node);
            }
        }

        function checkGrammar() {
            const targetZone = document.getElementById('target-zone');
            const resultMsg = document.getElementById('result-msg');
            const words = Array.from(targetZone.children).map(child => child.id);
            
            // Thứ tự đúng: Tôi (word-2) + Là (word-1) + Người VN (word-3)
            const correctOrder = ["word-2", "word-1", "word-3"];
            
            resultMsg.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
            
            if (words.length < 3) {
                resultMsg.innerHTML = "⚠️ Vui lòng xếp đủ các từ vào ô!";
                resultMsg.classList.add('bg-yellow-100', 'text-yellow-700');
            } else if (JSON.stringify(words) === JSON.stringify(correctOrder)) {
                resultMsg.innerHTML = "✨ Tuyệt vời! Ngữ pháp hoàn toàn chính xác: 我是越南人。";
                resultMsg.classList.add('bg-green-100', 'text-green-700');
            } else {
                resultMsg.innerHTML = "❌ Sai rồi! Hãy nhớ cấu trúc: Chủ ngữ + Động từ + Tân ngữ.";
                resultMsg.classList.add('bg-red-100', 'text-red-700');
            }
            resultMsg.classList.remove('hidden');
        }

        function resetGame() {
            const source = document.getElementById('source-zone');
            const target = document.getElementById('target-zone');
            const resultMsg = document.getElementById('result-msg');
            
            while (target.firstChild) {
                source.appendChild(target.firstChild);
            }
            resultMsg.classList.add('hidden');
        }
    </script>
</body>
</html>
