<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khu Vườn Bộ Thủ - Nga Học HSK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Noto+Sans+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-green: #a7c957;
            --ghibli-brown: #606c38;
            --ghibli-cream: #fefae0;
            --ghibli-orange: #bc6c25;
            --ghibli-sky: #caf0f8;
        }

        body { 
            font-family: 'Comfortaa', cursive; 
            background: linear-gradient(180deg, var(--ghibli-sky) 0%, #f7ede2 100%);
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-ghibli {
            background-color: white;
            border: 3px solid var(--ghibli-brown);
            border-radius: 20px;
            box-shadow: 0 5px 0 var(--ghibli-brown);
            transition: all 0.1s;
            color: var(--ghibli-brown);
            font-weight: 700;
            cursor: pointer;
        }
        .btn-ghibli:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 var(--ghibli-brown);
        }

        .instruction-text {
            font-size: 1.5rem;
            line-height: 1.4;
            font-weight: 700;
            color: #283618;
            padding: 0 10px;
            text-shadow: 1px 1px 0 white;
        }

        .choices-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .choice-card { 
            background: white;
            border: 3px solid #e9edc9;
            border-radius: 18px;
            padding: 10px 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            display: flex;
            align-items: center;
            min-height: 75px;
            transition: all 0.2s;
        }
        .choice-card:hover { border-color: var(--ghibli-green); background: #fdfdf5; }
        .choice-card.selected { background: #f7ede2; border-color: var(--ghibli-green); transform: scale(0.97); }

        .choice-label {
            background: var(--ghibli-brown);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 10px;
            flex-shrink: 0;
            font-size: 0.8rem;
        }

        .choice-text { font-size: 0.9rem; color: #283618; font-weight: 600; line-height: 1.2; }

        .hz-py-inline {
            display: inline-flex;
            align-items: baseline;
            gap: 4px;
            color: #2b5d34;
        }
        .hz-char {
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
        }
        .py-text {
            font-size: 1rem;
            color: var(--ghibli-orange);
            font-weight: 700;
        }

        #intro-slide { transition: transform 0.8s ease-in-out; }
        .slide-up { transform: translateY(-100%); }

        #modal-content {
            background: #fefae0;
            border-radius: 30px;
            padding: 25px;
            max-width: 350px;
            width: 90%;
            text-align: center;
            border: 4px solid #606c38;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .rank-badge {
            background: #bc6c25;
            color: white;
            padding: 6px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 900;
            display: inline-block;
            margin-top: 10px;
            box-shadow: 0 4px 0 #8b4513;
        }
    </style>
</head>
<body>

    <!-- Slide Mở Đầu -->
    <div id="intro-slide" class="fixed inset-0 z-[100] bg-[#fefae0] flex flex-col items-center justify-center p-6 text-center">
        <div class="relative z-10">
            <div class="text-8xl mb-4">🪴</div>
            <h1 class="text-4xl font-black text-[#606c38] mb-2 leading-tight">Khu Vườn Bộ Thủ<br>Phần 1</h1>
            <p class="text-[#bc6c25] font-bold text-xl mb-10">Giáo viên: Nga Học HSK</p>
            <button onclick="startGame()" class="btn-ghibli px-12 py-4 text-2xl">BẮT ĐẦU</button>
        </div>
    </div>

    <!-- Game Chính -->
    <div id="main-game" class="w-full max-w-2xl h-full flex flex-col p-4 opacity-0 transition-opacity duration-500">
        <header id="game-header" class="flex justify-between items-center mb-4">
            <div class="bg-white px-4 py-1 rounded-full border-2 border-[#e9edc9] shadow-sm flex flex-col items-center">
                <span class="text-[#606c38] font-black text-xl" id="score-display">0</span>
                <span class="text-[10px] font-bold uppercase text-gray-400">Điểm</span>
            </div>
            <div class="flex-grow mx-4">
                <div class="w-full h-4 bg-white/50 rounded-full border-2 border-[#e9edc9] overflow-hidden">
                    <div id="progress-bar" class="h-full bg-[#a7c957] transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
            <div class="bg-[#606c38] text-white px-4 py-1 rounded-xl font-bold text-sm" id="level-indicator">1/20</div>
        </header>

        <div id="game-content" class="flex-grow flex flex-col justify-center gap-4">
            <div class="text-center">
                <div class="text-[10px] uppercase tracking-widest font-black text-[#bc6c25] mb-1">Thử thách bộ thủ</div>
                <h2 id="instruction" class="instruction-text">Đang tải...</h2>
            </div>
            <div id="choices-container" class="choices-grid"></div>
        </div>

        <footer id="game-footer" class="py-4 flex justify-center">
            <button id="check-btn" onclick="checkAnswer()" class="btn-ghibli w-full max-w-[300px] py-4 text-xl bg-[#a7c957] text-white border-[#386641]">KIỂM TRA</button>
        </footer>
    </div>

    <!-- Popup Kết quả Tạm thời -->
    <div id="result-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[200] hidden flex items-center justify-center">
        <div id="modal-content" class="animate-pop">
            <div id="modal-icon" class="text-4xl mb-2">🌸</div>
            <h2 id="modal-title" class="text-2xl font-black mb-2">Tiêu đề</h2>
            <div id="modal-msg" class="text-sm mb-4 text-gray-700">Nội dung giải thích.</div>
            <button onclick="nextQuestion()" class="btn-ghibli w-full py-3 text-lg">TIẾP TỤC</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSfx(type) {
            const n = audioCtx.currentTime;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            
            if(type === 'boing') {
                o.frequency.setValueAtTime(200, n);
                o.frequency.exponentialRampToValueAtTime(600, n + 0.1);
                g.gain.setValueAtTime(0.1, n);
                g.gain.exponentialRampToValueAtTime(0.01, n + 0.1);
                o.connect(g).connect(audioCtx.destination);
                o.start(); o.stop(n + 0.1);
            } else if(type === 'win') {
                [440, 554, 659].forEach((f, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.frequency.value = f;
                    gain.gain.setValueAtTime(0, n + i*0.1);
                    gain.gain.linearRampToValueAtTime(0.1, n + i*0.1 + 0.05);
                    gain.gain.linearRampToValueAtTime(0, n + i*0.1 + 0.3);
                    osc.connect(gain).connect(audioCtx.destination);
                    osc.start(n + i*0.1); osc.stop(n + i*0.1 + 0.4);
                });
            } else {
                o.frequency.setValueAtTime(150, n);
                o.frequency.linearRampToValueAtTime(50, n + 0.5);
                g.gain.setValueAtTime(0.1, n);
                g.gain.linearRampToValueAtTime(0, n + 0.5);
                o.connect(g).connect(audioCtx.destination);
                o.start(); o.stop(n + 0.5);
            }
        }

        function hp(hanzi, pinyin) {
            return `<span class="hz-py-inline"><span class="hz-char">${hanzi}</span><span class="py-text"> - ${pinyin}</span></span>`;
        }

        const quizData = [
            { q: `Chữ 'Nghĩ' (${hp('想', 'xiǎng')}) chứa bộ Tâm (${hp('心', 'xīn')}) ở dưới vì sao?`, options: ["Vì suy nghĩ bắt nguồn từ trái tim", "Vì bộ Tâm chỉ âm đọc", "Vì bộ Tâm trang trí", "Vì nó liên quan đến chân"], correct: 0, explain: "Trong tư tưởng xưa, tim là nơi điều khiển tư duy." },
            { q: `Bộ Khẩu (${hp('口', 'kǒu')}) trong chữ 'Hét' (${hp('叫', 'jiào')}) thể hiện điều gì?`, options: ["Dùng tay", "Dùng chân", "Dùng miệng phát âm", "Dùng mắt"], correct: 2, explain: "Âm thanh phát ra từ miệng đều mang bộ Khẩu." },
            { q: `Chữ 'Nhìn' (${hp('看', 'kàn')}) gồm bộ Mục (${hp('目', 'mù')}) và tay (${hp('扌', 'shǒu')}) vì?`, options: ["Che nắng để nhìn rõ hơn", "Đánh vào mắt", "Chỉ đôi chân", "Chỉ phụ nữ múa"], correct: 0, explain: "Hình ảnh bàn tay che trên mắt để nhìn xa." },
            { q: `Bộ Túc (${hp('足', 'zú')}) xuất hiện trong chữ 'Chạy' (${hp('跑', 'pǎo')}) vì?`, options: ["Dùng tay", "Dùng chân", "Dùng miệng", "Dùng bụng"], correct: 1, explain: "Bộ Túc chỉ các hoạt động của đôi chân." },
            { q: `Chữ 'Mẹ' (${hp('妈', 'mā')}) có bộ Nữ (${hp('女', 'nǚ')}) bên trái để?`, options: ["Chỉ âm đọc", "Chỉ con ngựa", "Chỉ giới tính", "Chỉ sự giàu có"], correct: 2, explain: "Bộ Nữ xác định đối tượng là phái nữ." },
            { q: `Tại sao chữ 'Bận' (${hp('忙', 'máng')}) có bộ Tâm đứng (${hp('忄', 'xīn')})?`, options: ["Bận đau tay", "Bận làm tâm trí lo âu", "Bận đi bộ", "Bận ăn nhiều"], correct: 1, explain: "Sự bận rộn tác động lên tinh thần." },
            { q: `Bộ Lực (${hp('力', 'lì')}) trong chữ 'Giúp đỡ' (${hp('助', 'zhù')}) có ý nghĩa gì?`, options: ["Dùng miệng", "Dùng sức hỗ trợ", "Dùng tiền", "Dùng quần áo"], correct: 1, explain: "Trợ giúp đòi hỏi bỏ công sức (Lực)." },
            { q: `Bộ Nhục (${hp('月/肉', 'ròu')}) trong chữ 'Bụng' (${hp('肚', 'dù')}) chỉ điều gì?`, options: ["Mặt trăng", "Thời gian", "Bộ phận cơ thể (thịt)", "Bầu trời"], correct: 2, explain: "Bộ Nguyệt này là biến thể của bộ Nhục (thịt)." },
            { q: `Chữ 'Tìm kiếm' (${hp('找', 'zhǎo')}) có bộ Thủ (${hp('扌', 'shǒu')}) vì?`, options: ["Dùng tay tìm tòi", "Dùng chân nhảy", "Dùng miệng ăn", "Dùng mắt ngủ"], correct: 0, explain: "Tìm kiếm là thao tác bằng tay." },
            { q: `Bộ Hiệt (${hp('页', 'yè')}) trong chữ 'Khuôn mặt' (${hp('颜', 'yán')}) liên quan đến?`, options: ["Bàn chân", "Bàn tay", "Phần đầu/mặt", "Cái bụng"], correct: 2, explain: "Bộ Hiệt chỉ các bộ phận trên đầu." },
            { q: `Chữ 'Anh ấy' (${hp('他', 'tā')}) có bộ Nhân đứng (${hp('亻', 'rén')}) vì?`, options: ["Đồ vật", "Con vật", "Con người", "Loài cây"], correct: 2, explain: "Bộ Nhân chỉ các đại từ liên quan đến người." },
            { q: `Bộ Thân (${hp('身', 'shēn')}) trong chữ 'Nằm' (${hp('躺', 'tǎng')}) có nghĩa là?`, options: ["Cái cây", "Cơ thể con người", "Đôi giày", "Cuốn sách"], correct: 1, explain: "Nằm tác động lên toàn thân thể." },
            { q: `Chữ 'Ăn' (${hp('吃', 'chī')}) bắt buộc phải có bộ thủ nào?`, options: ["Bộ Thủ", "Bộ Khẩu", "Bộ Túc", "Bộ Mục"], correct: 1, explain: "Ăn uống là công dụng của miệng (Khẩu)." },
            { q: `Bộ Mục (${hp('目', 'mù')}) có hình dáng ban đầu mô phỏng?`, options: ["Cái miệng", "Bàn tay", "Con mắt nằm ngang", "Cái chân"], correct: 2, explain: "Chữ Mục vốn là hình vẽ một con mắt." },
            { q: `Chữ 'Sợ hãi' (${hp('怕', 'pà')}) có bộ Tâm đứng (${hp('忄', 'xīn')}) vì?`, options: ["Sợ đau chân", "Sợ là cảm xúc", "Sợ đi ngủ", "Sợ đi hát"], correct: 1, explain: "Các tính từ chỉ cảm xúc luôn chứa bộ Tâm." },
            { q: `Hành động 'Nhảy' (${hp('跳', 'tiào')}) dùng bộ thủ nào?`, options: ["Bộ Nữ", "Bộ Lực", "Bộ Túc", "Bộ Hiệt"], correct: 2, explain: "Nhảy là hoạt động của đôi chân." },
            { q: `Tại sao chữ 'Cô ấy' (${hp('她', 'tā')}) dùng bộ Nữ?`, options: ["Phân biệt giới tính", "Chỉ con ngựa", "Sự thông minh", "Chỉ người già"], correct: 0, explain: "Bộ Nữ xác định đây là đại từ nữ." },
            { q: `Chữ 'Cầm/Nắm' (${hp('拿', 'ná')}) có bộ Thủ (${hp('手', 'shǒu')}) ở dưới vì?`, options: ["Chỉ âm thanh", "Thực hiện bằng tay", "Liên quan đến ăn", "Liên quan đến nhìn"], correct: 1, explain: "Tay là công cụ cầm nắm." },
            { q: `Bộ Lực (${hp('力', 'lì')}) có hình dáng mô phỏng cái gì?`, options: ["Cái miệng", "Cái cày dùng sức", "Cái gương", "Đám mây"], correct: 1, explain: "Sức lao động xưa gắn với việc đồng áng." },
            { q: `Hành động 'Né tránh' (${hp('躲', 'duǒ')}) có bộ Thân (${hp('身', 'shēn')}) vì?`, options: ["Dùng tay", "Dùng cơ thể", "Dùng miệng", "Dùng mắt"], correct: 1, explain: "Khi né tránh, chúng ta di chuyển toàn thân thể." }
        ];

        let currentIdx = 0, score = 0, currentSelection = null;

        function startGame() {
            playSfx('boing');
            document.getElementById('intro-slide').classList.add('slide-up');
            document.getElementById('main-game').classList.remove('opacity-0');
            renderQuestion();
        }

        function renderQuestion() {
            const q = quizData[currentIdx];
            document.getElementById('instruction').innerHTML = q.q;
            document.getElementById('level-indicator').innerText = `${currentIdx + 1}/20`;
            document.getElementById('progress-bar').style.width = `${(currentIdx / 20) * 100}%`;
            
            const container = document.getElementById('choices-container');
            container.innerHTML = '';
            currentSelection = null;

            ['A', 'B', 'C', 'D'].forEach((label, idx) => {
                const card = document.createElement('div');
                card.className = 'choice-card';
                card.innerHTML = `<div class="choice-label">${label}</div><div class="choice-text">${q.options[idx]}</div>`;
                card.onclick = () => {
                    playSfx('boing');
                    document.querySelectorAll('.choice-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    currentSelection = idx;
                };
                container.appendChild(card);
            });
        }

        function checkAnswer() {
            if (currentSelection === null) return;
            const q = quizData[currentIdx];
            const isCorrect = currentSelection === q.correct;

            if (isCorrect) {
                playSfx('win');
                score += 10;
                document.getElementById('modal-icon').innerText = "🌸";
                document.getElementById('modal-title').innerText = "Tuyệt quá!";
                document.getElementById('modal-title').style.color = "#386641";
            } else {
                playSfx('fail');
                document.getElementById('modal-icon').innerText = "☁️";
                document.getElementById('modal-title').innerText = "Oopss!";
                document.getElementById('modal-title').style.color = "#bc6c25";
            }
            document.getElementById('modal-msg').innerText = q.explain;
            document.getElementById('score-display').innerText = score;
            document.getElementById('result-modal').classList.remove('hidden');
        }

        function nextQuestion() {
            document.getElementById('result-modal').classList.add('hidden');
            currentIdx++;
            if (currentIdx < quizData.length) {
                renderQuestion();
            } else {
                showFinal();
            }
        }

        function getReview(scoreValue) {
            if (scoreValue >= 200) return { 
                rank: "BẬC THẦY 'SOI' CHỮ", 
                msg: "Kinh khủng thật! Bạn không phải người thường, bạn là từ điển sống rồi. Chắc kiếp trước bạn là người tạo ra bộ thủ đúng không? 👏",
                icon: "👑"
            };
            if (scoreValue >= 150) return { 
                rank: "CAO THỦ VƯỜN CHỮ", 
                msg: "Mắt xếch nhìn chữ nào ra chữ nấy! Bạn chỉ cần thêm một xíu 'may mắn' nữa là thành huyền thoại rồi đó. Quá đỉnh! 🔥",
                icon: "😎"
            };
            if (scoreValue >= 100) return { 
                rank: "DÂN CHƠI HỆ BỘ THỦ", 
                msg: "Cũng ra gì và này nọ đấy! Kiến thức của bạn đủ để đi 'loè' mấy đứa bạn mới học rồi. Tiếp tục phát huy nhé! 👍",
                icon: "✨"
            };
            if (scoreValue >= 50) return { 
                rank: "NGƯỜI QUA ĐƯỜNG NGƠ NGÁC", 
                msg: "Hình như bạn vào nhầm vườn rồi? Nhưng không sao, sai là để sửa, ngã ở đâu thì... nằm đó nghỉ một lát rồi thi lại nhé! 😴",
                icon: "🐾"
            };
            return { 
                rank: "THIÊN TÀI NGỦ GẬT", 
                msg: "Điểm số này chứng minh bạn rất có tiềm năng trở thành... một người cần học lại từ đầu. Đừng buồn, Nga Học HSK vẫn đợi bạn mà! 😂",
                icon: "🤡"
            };
        }

        function showFinal() {
            const review = getReview(score);
            const gameContainer = document.getElementById('main-game');
            
            // Xóa sạch nội dung cũ để đảm bảo hiển thị đúng
            gameContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-full w-full py-8 px-4 animate-pop">
                    <div class="text-8xl mb-4 drop-shadow-lg">${review.icon}</div>
                    <h2 class="text-3xl font-black text-[#606c38] mb-6">KẾT QUẢ CUỐI CÙNG</h2>
                    
                    <div class="bg-white w-full max-w-sm p-8 rounded-[2.5rem] border-4 border-[#a7c957] mb-6 shadow-xl relative text-center">
                        <div class="text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Bạn đã đạt được</div>
                        <div class="text-7xl font-black text-[#283618] mb-4">${score}</div>
                        <div class="text-xs font-bold text-gray-500 mb-4 italic">trên tổng 200 điểm</div>
                        <div class="rank-badge">${review.rank}</div>
                    </div>

                    <div class="bg-white/80 backdrop-blur-sm p-6 rounded-2xl border-2 border-dashed border-[#bc6c25] mb-8 w-full max-w-sm shadow-md">
                        <p class="text-[#606c38] font-bold text-sm leading-relaxed italic">
                            "${review.msg}"
                        </p>
                    </div>

                    <button onclick="location.reload()" class="btn-ghibli w-full max-w-sm py-5 text-xl bg-[#606c38] text-white">CHƠI LẠI TỪ ĐẦU</button>
                    
                    <p class="mt-8 text-[#bc6c25] font-black text-xs uppercase tracking-tighter">Cảm ơn bạn đã tham gia cùng Nga Học HSK!</p>
                </div>
            `;
        }
    </script>
</body>
</html>
