<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giải Mã Bộ Thủ 4 - Nga Học HSK</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --animal-orange: #f39c12;
            --safari-brown: #a0522d;
            --wild-yellow: #f1c40f;
            --primary-pink: #ff85a1;
            --dark-text: #2c3e50;
            --light-bg: #fffcf0;
            --success: #27ae60;
            --wrong: #e74c3c;
        }

        * { box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #fef9e7 0%, #fdf2e9 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .game-wrapper {
            width: 100%;
            max-width: 850px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            border: 6px solid var(--animal-orange);
            overflow: hidden;
            position: relative;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            flex-direction: column;
            padding: 30px;
            animation: fadeIn 0.4s ease-out;
            flex-grow: 1;
        }

        .active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Welcome Screen */
        #welcome-screen { text-align: center; justify-content: center; }
        .logo { font-size: 80px; margin-bottom: 10px; }
        .main-title { font-family: 'Comfortaa', cursive; color: var(--safari-brown); font-size: 32px; margin: 0; }
        .sub-title { color: var(--animal-orange); font-size: 18px; font-weight: 700; margin-bottom: 30px; }
        
        .btn-play {
            padding: 18px 50px;
            font-size: 20px;
            background: var(--animal-orange);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #ba780d;
            transition: 0.2s;
            font-weight: 800;
        }
        .btn-play:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #ba780d; }
        .btn-play:active { transform: translateY(3px); box-shadow: 0 3px 0 #ba780d; }

        /* Header & Progress */
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .progress-bar-bg { flex-grow: 1; height: 12px; background: #eee; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--animal-orange), var(--wild-yellow)); transition: 0.4s; }
        .badge { background: var(--safari-brown); color: white; padding: 5px 15px; border-radius: 20px; font-weight: 700; font-size: 12px; }

        /* Question Area */
        .question-box { font-size: 22px; font-weight: 700; color: var(--dark-text); margin-bottom: 25px; line-height: 1.4; }
        .game-layout { display: grid; grid-template-columns: 1fr 240px; gap: 20px; }
        
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn {
            background: #fff;
            border: 2px solid #f2e6d9;
            padding: 16px 20px;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }
        .opt-btn:hover:not(:disabled) { border-color: var(--animal-orange); background: #fffcf0; }
        .opt-btn.correct { background: var(--success) !important; color: white; border-color: #1e8449; transform: scale(1.02); }
        .opt-btn.wrong { background: var(--wrong) !important; color: white; border-color: #c0392b; }

        .visual-hint {
            background: #fdf5e6;
            border-radius: 24px;
            border: 4px solid var(--safari-brown);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 90px;
            height: 240px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
        }
        .visual-hint span { font-size: 15px; font-weight: 700; color: var(--safari-brown); margin-top: 15px; letter-spacing: 1px; }

        /* Explanation Section */
        .explanation-box {
            margin-top: 20px;
            background: #fef5e7;
            border-radius: 20px;
            padding: 18px;
            border-left: 6px solid var(--animal-orange);
            display: none;
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .explanation-box h4 { margin: 0 0 8px 0; color: var(--safari-brown); font-size: 18px; }
        .explanation-box p { margin: 0; font-size: 16px; color: #334155; line-height: 1.5; }

        /* Control Footer */
        .footer { margin-top: auto; padding-top: 25px; display: flex; justify-content: flex-end; }
        .btn-next {
            background: var(--safari-brown);
            color: white;
            padding: 14px 35px;
            border-radius: 50px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 0 #6d371d;
            display: none;
            font-size: 16px;
        }
        .btn-next:hover { background: #8b4513; }

        /* Final Result */
        #result-screen { text-align: center; align-items: center; justify-content: center; }
        .score-card {
            background: #fff;
            padding: 30px;
            border-radius: 30px;
            border: 4px solid var(--animal-orange);
            margin-bottom: 25px;
        }
        .score-card b { font-size: 60px; color: var(--animal-orange); display: block; }

        @media (max-width: 700px) {
            .game-layout { grid-template-columns: 1fr; }
            .visual-hint { height: 140px; font-size: 60px; order: -1; }
        }
    </style>
</head>
<body>

<audio id="s-correct" src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3"></audio>
<audio id="s-wrong" src="https://assets.mixkit.co/active_storage/sfx/251/251-preview.mp3"></audio>
<audio id="s-pop" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<div class="game-wrapper">
    <!-- START SCREEN -->
    <div id="welcome-screen" class="screen active">
        <div class="logo">🦁</div>
        <h1 class="main-title">THỬ THÁCH BỘ THỦ 4</h1>
        <div class="sub-title">THẾ GIỚI ĐỘNG VẬT QUANH TA</div>
        <button class="btn-play" onclick="startGame()">BẮT ĐẦU KHÁM PHÁ 🐾</button>
        <p style="margin-top: 25px; color: #4a5568; font-size: 15px;">Cùng Cô Nga chinh phục tiếng Trung qua hình ảnh!</p>
    </div>

    <!-- PLAY SCREEN -->
    <div id="game-screen" class="screen">
        <div class="header">
            <div class="badge">Nga Học HSK</div>
            <div class="progress-bar-bg"><div id="progress-fill" class="progress-fill"></div></div>
            <div style="font-weight:800; min-width:70px;">Câu: <span id="q-idx">1</span>/20</div>
        </div>

        <div id="q-text" class="question-box">Đang chuẩn bị câu hỏi...</div>

        <div class="game-layout">
            <div id="options" class="options-list"></div>
            <div class="visual-hint">
                <div id="v-icon">🐒</div>
                <span id="v-label">ĐỘNG VẬT</span>
            </div>
        </div>

        <div id="expl-box" class="explanation-box">
            <h4><i class="fa-solid fa-paw"></i> Giải mã từ Cô Nga:</h4>
            <p id="expl-text"></p>
        </div>

        <div class="footer">
            <button id="next-btn" class="btn-next" onclick="nextQuestion()">TIẾP TỤC 🐾</button>
        </div>
    </div>

    <!-- FINAL SCREEN -->
    <div id="result-screen" class="screen">
        <div style="font-size:90px">🦁</div>
        <h2 style="color:var(--safari-brown); margin: 10px 0;">CHÚA TỂ BỘ THỦ!</h2>
        <div class="score-card">
            <span style="font-size:16px; font-weight:700; color:#64748b">ĐIỂM SỐ CỦA BẠN</span>
            <b id="final-score">0</b>
        </div>
        <p id="final-msg" style="font-weight:600; color:#475569; margin-bottom: 30px; font-size: 18px;"></p>
        <button class="btn-play" onclick="location.reload()">HỌC LẠI NÀO!</button>
    </div>
</div>

<script>
    const animalQuiz = [
        {
            q: "Chữ '狗' (gǒu - con chó) có bộ Khuyển (犭) bên trái. Bộ này tượng trưng cho loài vật nào?",
            options: ["Các loài thú có vú, động vật bốn chân", "Các loài chim", "Các loài cá", "Các loài côn trùng"],
            a: "Các loài thú có vú, động vật bốn chân",
            expl: "Bộ Khuyển (犭) là hình ảnh con chó đứng dựng đứng. Nó dùng để chỉ các loài thú bốn chân như: chó, mèo (猫), lợn (猪), sư tử (狮).",
            icon: "🐕"
        },
        {
            q: "Bộ Điểu (鸟) trong chữ '鸡' (jī - con gà) mô phỏng hình ảnh gì?",
            options: ["Con chim có lông và đuôi", "Con chim đang bay", "Con chim đang hót", "Tổ chim"],
            a: "Con chim có lông và đuôi",
            expl: "Bộ Điểu (鸟) là chữ tượng hình vẽ một con chim với mắt, lông và mào. Các loài gia cầm và chim chóc đều dùng bộ này.",
            icon: "🐔"
        },
        {
            q: "Chữ '鱼' (yú - cá) có nét ngang ở dưới cùng tượng trưng cho bộ phận nào?",
            options: ["Đuôi cá", "Vây cá", "Mắt cá", "Miệng cá"],
            a: "Đuôi cá",
            expl: "Chữ Ngư (鱼) vẽ hình đầu cá, vảy cá và nét ngang ở dưới chính là biến thể của cái đuôi cá.",
            icon: "🐟"
        },
        {
            q: "Bộ Trùng (虫) trong chữ '蚂蚁' (mǎyǐ - con kiến) thường chỉ loại động vật nào?",
            options: ["Côn trùng, sâu bọ, bò sát", "Chim chóc", "Thú săn mồi", "Động vật dưới nước"],
            a: "Côn trùng, sâu bọ, bò sát",
            expl: "Bộ Trùng (虫) vẽ hình một con sâu/rắn nhỏ. Nó dùng cho kiến, muỗi, rắn (蛇), tôm (虾 - vì xưa coi tôm là sâu dưới nước).",
            icon: "🐜"
        },
        {
            q: "Bộ Mã (马) trong chữ '骑' (qí - cưỡi) tượng trưng cho con vật nào giúp con người di chuyển?",
            options: ["Con ngựa", "Con bò", "Con lừa", "Con voi"],
            a: "Con ngựa",
            expl: "Bộ Mã (马) vẽ hình con ngựa đang phi, với bờm và chân. Chữ 'Cưỡi' có bộ Mã vì muốn cưỡi thì phải có ngựa!",
            icon: "🐎"
        },
        {
            q: "Trong chữ '鲜' (xiān - tươi mới), sự kết hợp giữa bộ Ngư (鱼) và bộ Dương (羊 - con dê) mang ý nghĩa gì?",
            options: ["Cá và thịt dê ăn cùng rất tươi ngon", "Con dê đang ăn cá", "Con cá trông giống con dê", "Mùi tanh của cá"],
            a: "Cá và thịt dê ăn cùng rất tươi ngon",
            expl: "Người xưa cho rằng thịt cá và thịt dê là hai loại thực phẩm bổ dưỡng và tươi nhất, nên ghép lại thành chữ 'Tươi'.",
            icon: "🐑"
        },
        {
            q: "Bộ Ngưu (牛) trong chữ '物' (wù - đồ vật/sự vật) tượng trưng cho con vật nào?",
            options: ["Con bò/trâu", "Con lợn", "Con dê", "Con chó"],
            a: "Con bò/trâu",
            expl: "Bộ Ngưu (牛) vẽ hình đầu con bò với hai cái sừng. Ngày xưa bò là tài sản quan trọng nhất nên đại diện cho mọi 'sự vật'.",
            icon: "🐂"
        },
        {
            q: "Chữ '家' (jiā - nhà) có bộ Miên (宀 - mái nhà) và bộ Thỉ (豕 - con lợn) ở dưới. Tại sao trong nhà lại có lợn?",
            options: ["Nuôi lợn dưới gầm sàn mới được coi là một nhà", "Lợn là thú cưng", "Nhà làm bằng thịt lợn", "Tên của chủ nhà"],
            a: "Nuôi lợn dưới gầm sàn mới được coi là một nhà",
            expl: "Thời cổ đại, một gia đình được coi là ổn định khi có nhà ở và có gia súc (lợn) để ăn. Thỉ (豕) chính là bộ thủ chỉ con lợn.",
            icon: "🏠"
        },
        {
            q: "Bộ Vũ (羽) trong chữ '翅膀' (chìbǎng - cánh) tượng trưng cho cái gì của loài chim?",
            options: ["Lông vũ/Cánh", "Cái mỏ", "Chân chim", "Tiếng hót"],
            a: "Lông vũ/Cánh",
            expl: "Bộ Vũ (羽) vẽ hình hai chiếc lông vũ hoặc hai cánh chim cạnh nhau.",
            icon: "🪶"
        },
        {
            q: "Chữ '虎' (hǔ - con hổ) có bộ Hổ (虍) ở phía trên. Bộ này mô phỏng đặc điểm nào của hổ?",
            options: ["Vằn trên da hổ", "Móng vuốt", "Đuôi hổ", "Tiếng gầm"],
            a: "Vằn trên da hổ",
            expl: "Bộ Hổ (虍) mô tả cái đầu hổ với những vằn vện đặc trưng của chúa sơn lâm.",
            icon: "🐅"
        },
        {
            q: "Bộ Hợi (豕) và bộ Khuyển (犭) khác nhau ở chỗ nào khi dùng làm bộ thủ?",
            options: ["Khuyển dùng cho thú săn/thú nuôi, Thỉ dùng cho lợn", "Giống hệt nhau", "Chỉ dùng cho chim", "Chỉ dùng cho cá"],
            a: "Khuyển dùng cho thú săn/thú nuôi, Thỉ dùng cho lợn",
            expl: "Dù đều là động vật 4 chân, nhưng chữ Trung Quốc phân chia rất rõ: 犭thường là thú dữ/thú chạy nhanh, còn 豕 là lợn.",
            icon: "🐖"
        },
        {
            q: "Chữ '象' (xiàng - con voi) là chữ tượng hình vẽ đặc điểm gì nổi bật nhất?",
            options: ["Cái vòi dài", "Cái tai to", "Đôi ngà", "Cái bụng phệ"],
            a: "Cái vòi dài",
            expl: "Chữ Tượng (象) vẽ lại hình dáng con voi đứng thẳng với cái vòi dài uyển chuyển phía trên.",
            icon: "🐘"
        },
        {
            q: "Bộ Mi (𠂇) trong chữ '龟' (guī - con rùa) mô tả bộ phận nào?",
            options: ["Mai rùa", "Đuôi rùa", "Đầu rùa", "Trứng rùa"],
            a: "Mai rùa",
            expl: "Chữ Quy (龟) vẽ hình con rùa nhìn từ trên xuống với cái mai cứng có vân.",
            icon: "🐢"
        },
        {
            q: "Bộ Thử (鼠) trong chữ '老鼠' (lǎoshǔ - con chuột) mô tả cái gì?",
            options: ["Hàm răng sắc nhọn và cái đuôi", "Đôi tai to", "Bộ lông xám", "Hành động ăn trộm"],
            a: "Hàm răng sắc nhọn và cái đuôi",
            expl: "Chữ Thử (鼠) vẽ đầu con chuột với răng cửa dài (để gặm nhấm) và cái đuôi phía dưới.",
            icon: "🐭"
        },
        {
            q: "Chữ '鹿' (lù - con hươu) có phần trên cùng tượng trưng cho?",
            options: ["Cặp sừng", "Đôi mắt", "Cái cổ dài", "Đốm trên lưng"],
            a: "Cặp sừng",
            expl: "Bộ Lộc (鹿) vẽ hình con hươu có cặp sừng đẹp trên đầu và đôi chân dài đang đứng.",
            icon: "🦌"
        },
        {
            q: "Tại sao chữ '群' (qún - bầy đàn) lại có bộ Dương (羊 - con dê)?",
            options: ["Dê là loài vật sống theo bầy đàn điển hình", "Dê thích đi một mình", "Dê rất hung dữ", "Dê chạy rất nhanh"],
            a: "Dê là loài vật sống theo bầy đàn điển hình",
            expl: "Dê là loài gia súc hiền lành, luôn đi cùng nhau, nên bộ Dương đại diện cho ý nghĩa tập hợp, bầy đàn.",
            icon: "🐑"
        },
        {
            q: "Bộ Trùng (虫) có bao nhiêu nét nếu viết độc lập?",
            options: ["6 nét", "5 nét", "4 nét", "7 nét"],
            a: "6 nét",
            expl: "Bộ Trùng (虫) gồm 6 nét: sổ, ngang gập, ngang, sổ, hất và chấm.",
            icon: "🐛"
        },
        {
            q: "Chữ '蛇' (shé - con rắn) có bộ Trùng (虫). Tại sao không có bộ Khuyển?",
            options: ["Vì rắn bò sát, không có chân", "Vì rắn biết bay", "Vì rắn sống dưới nước", "Vì rắn có lông"],
            a: "Vì rắn bò sát, không có chân",
            expl: "Ngày xưa người Trung Quốc xếp rắn vào nhóm 'Trùng' (loài bò sát, sâu bọ), không phải nhóm thú (Khuyển).",
            icon: "🐍"
        },
        {
            q: "Bộ Chu (隹) trong chữ '难' (nán - khó) tượng trưng cho loài chim gì?",
            options: ["Chim đuôi ngắn", "Chim đại bàng", "Chim công", "Chim sẻ"],
            a: "Chim đuôi ngắn",
            expl: "Bộ Truy (隹) khác bộ Điểu (鸟) ở chỗ nó mô phỏng loài chim đuôi ngắn. Nó xuất hiện trong rất nhiều chữ Hán.",
            icon: "🐦"
        },
        {
            q: "Học bộ thủ nhóm Động vật giúp bạn làm gì?",
            options: ["Phân loại và nhớ nhanh từ vựng về muông thú", "Biết cách đi săn", "Học cách cưỡi ngựa", "Nhớ tên các món ăn"],
            a: "Phân loại và nhớ nhanh từ vựng về muông thú",
            expl: "Cứ thấy 犭là thú, thấy 鸟 là chim, thấy 鱼 là cá. Đó chính là chìa khóa để 'hack' não tiếng Trung đấy!",
            icon: "🎓"
        }
    ];

    let currentQ = 0;
    let score = 0;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function playSfx(id) {
        const sound = document.getElementById(id);
        if (sound) {
            sound.currentTime = 0;
            sound.play().catch(e => {});
        }
    }

    function startGame() {
        playSfx('s-pop');
        document.getElementById('welcome-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        loadQuestion();
    }

    function loadQuestion() {
        const data = animalQuiz[currentQ];
        const options = shuffle([...data.options]);
        
        document.getElementById('q-idx').innerText = currentQ + 1;
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('v-icon').innerText = data.icon;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = "";
        
        options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerHTML = `<span style="background:var(--animal-orange); color:white; width:28px; height:28px; display:inline-flex; align-items:center; justify-content:center; border-radius:50%; margin-right:12px; font-size:14px">${String.fromCharCode(65+i)}</span> ${opt}`;
            btn.onclick = () => checkAnswer(btn, opt);
            optionsDiv.appendChild(btn);
        });

        document.getElementById('expl-box').style.display = "none";
        document.getElementById('next-btn').style.display = "none";
        
        const progress = (currentQ / animalQuiz.length) * 100;
        document.getElementById('progress-fill').style.width = progress + "%";
    }

    function checkAnswer(btn, selected) {
        const data = animalQuiz[currentQ];
        const allBtns = document.querySelectorAll('.opt-btn');
        allBtns.forEach(b => b.disabled = true);

        if (selected === data.a) {
            btn.classList.add('correct');
            score += 10;
            playSfx('s-correct');
        } else {
            btn.classList.add('wrong');
            playSfx('s-wrong');
            allBtns.forEach(b => {
                if (b.innerText.includes(data.a)) b.classList.add('correct');
            });
        }

        document.getElementById('expl-text').innerText = data.expl;
        document.getElementById('expl-box').style.display = "block";
        document.getElementById('next-btn').style.display = "block";
    }

    function nextQuestion() {
        playSfx('s-pop');
        currentQ++;
        if (currentQ < animalQuiz.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('final-score').innerText = score;
        document.getElementById('progress-fill').style.width = "100%";

        let msg = "";
        if (score >= 180) msg = "Quá đỉnh! Bạn thực sự là chuyên gia thế giới động vật Hán ngữ! 🦁";
        else if (score >= 140) msg = "Rất giỏi! Bạn đã nắm vững các loài thú cơ bản rồi đó. 🐎";
        else msg = "Đừng nản chí! Muông thú rất đa dạng, hãy ôn lại cùng Cô Nga nhé! 🐦";
        document.getElementById('final-msg').innerText = msg;
    }
</script>
</body>
</html>
